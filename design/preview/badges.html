<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 22px; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .lead { display:flex; align-items:baseline; gap:8px; margin-bottom: 16px; }
  .lead b { font-size: 14px; font-weight: 700; }
  .lead span { font-size: 12px; color: var(--muted-foreground); }
  .grp { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
  .badge { display:inline-flex; align-items:center; gap:5px; padding:2px 10px; border-radius:var(--radius-full); font-size:12px; font-weight:600; }
  .badge svg { width:12px; height:12px; }
  .cap { font-family:var(--font-mono); font-size:10.5px; color:var(--muted-foreground); }
  .dot { width:8px;height:8px;border-radius:99px;display:inline-block; }
</style>
</head>
<body>
  <div class="lead"><b>Badges</b><span>Pill labels — rounded-full, text-xs, semibold. Color maps to the status language.</span></div>
  <div class="grp">
    <span class="badge" style="background:var(--primary);color:#fff">Default</span>
    <span class="badge" style="background:var(--secondary);color:var(--foreground)">Secondary</span>
    <span class="badge" style="background:var(--destructive);color:#fff">Critical</span>
    <span class="badge" style="background:#fff;border:1px solid var(--border);color:var(--foreground)">Outline</span>
  </div>
  <div class="cap" style="margin-bottom:18px">variants: default · secondary · destructive · outline</div>
  <div class="lead"><b style="font-size:13px">Status badges</b></div>
  <div class="grp">
    <span class="badge" style="background:var(--status-pending-bg);color:var(--status-pending)"><i data-lucide="clock"></i>Pending</span>
    <span class="badge" style="background:var(--status-accepted-bg);color:var(--status-accepted)"><i data-lucide="check"></i>Accepted</span>
    <span class="badge" style="background:var(--status-active-bg);color:var(--status-active)"><i data-lucide="send"></i>Sent</span>
    <span class="badge" style="background:var(--status-rejected-bg);color:var(--status-rejected)"><i data-lucide="x"></i>Rejected</span>
    <span class="badge" style="background:var(--status-neutral-bg);color:var(--status-neutral)"><span class="dot" style="background:var(--status-neutral)"></span>Expired</span>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
