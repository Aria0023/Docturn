<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 22px; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .lead { display:flex; align-items:baseline; gap:8px; margin-bottom: 16px; }
  .lead b { font-size: 14px; font-weight: 700; }
  .lead span { font-size: 12px; color: var(--muted-foreground); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  /* product card */
  .pcard { background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); padding:16px; }
  .pcard .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .avatar { width:34px;height:34px;border-radius:99px;background:#DBEAFE;color:var(--primary);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center; }
  .ttl { font-size:14px;font-weight:700; }
  .sub { font-size:12px;color:var(--muted-foreground); }
  .badge { display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600; }
  .badge svg{width:11px;height:11px;}
  .meta { font-size:12px;color:var(--muted-foreground);display:flex;gap:6px;align-items:center;margin-top:4px;}
  .meta svg{width:13px;height:13px;}
  .act { margin-top:12px; }
  .btn { width:100%;height:36px;border:none;border-radius:var(--radius-md);background:var(--primary);color:#fff;font-size:13px;font-weight:500;cursor:pointer; }
  /* marketing card */
  .mcard { border-radius:var(--radius-2xl); padding:18px; color:#0c4a6e; background:linear-gradient(150deg,#E0F2FE, #fff); box-shadow:var(--shadow-xl); }
  .mcard .ico { width:38px;height:38px;border-radius:10px;background:var(--sky-gradient);color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
  .mcard h4 { margin:0 0 4px;font-size:16px;font-weight:700;color:#0f172a;}
  .mcard p { margin:0;font-size:12.5px;color:#475569;line-height:1.5;}
</style>
</head>
<body>
  <div class="lead"><b>Cards</b><span>Product: white, bordered, soft shadow. Marketing: rounded-2xl, tinted, shadow-xl.</span></div>
  <div class="grid">
    <div class="pcard">
      <div class="top">
        <div style="display:flex;gap:10px;align-items:center">
          <div class="avatar">SC</div>
          <div><div class="ttl">Patient SC · Rm 412</div><div class="sub">Chest pain · ER → Hospitalist</div></div>
        </div>
        <span class="badge" style="background:var(--status-pending-bg);color:var(--status-pending)"><i data-lucide="clock"></i>Pending</span>
      </div>
      <div class="meta"><i data-lucide="timer"></i>Expires in 4:32 · routed via round‑robin</div>
      <div class="act"><button class="btn">Accept assignment</button></div>
    </div>
    <div class="mcard">
      <div class="ico"><i data-lucide="route"></i></div>
      <h4>Automatic round‑robin</h4>
      <p>Every admit routes to the next available hospitalist — no phone tag, no guesswork.</p>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
