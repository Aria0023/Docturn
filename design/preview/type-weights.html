<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .lead { display:flex; align-items:baseline; gap:8px; margin-bottom: 16px; }
  .lead b { font-size: 14px; font-weight: 700; }
  .lead span { font-size: 12px; color: var(--muted-foreground); }
  .grid { display:grid; grid-template-columns: repeat(2,1fr); gap:14px; }
  .w { padding:12px 14px; border:1px solid var(--border); border-radius:var(--radius-lg); }
  .big { font-size:22px; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--muted-foreground); margin-top:6px; }
</style>
</head>
<body>
  <div class="lead"><b>Weights &amp; hierarchy</b><span>Four weights carry the whole system.</span></div>
  <div class="grid">
    <div class="w"><div class="big" style="font-weight:700">Bold heading</div><div class="tag">700 · headings, hero, card titles, stats</div></div>
    <div class="w"><div class="big" style="font-weight:600">Semibold label</div><div class="tag">600 · badges, sub‑labels, emphasis</div></div>
    <div class="w"><div class="big" style="font-weight:500">Medium button</div><div class="tag">500 · buttons (shadcn default)</div></div>
    <div class="w"><div class="big" style="font-weight:400">Normal body text</div><div class="tag">400 · body, paragraphs</div></div>
  </div>
</body>
</html>
