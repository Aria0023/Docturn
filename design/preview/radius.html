<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .lead { display:flex; align-items:baseline; gap:8px; margin-bottom: 16px; }
  .lead b { font-size: 14px; font-weight: 700; }
  .lead span { font-size: 12px; color: var(--muted-foreground); }
  .row { display:flex; gap:16px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:74px; height:60px; background:#DBEAFE; border:1.5px solid var(--primary); }
  .nm { font-size:12px; font-weight:600; margin-top:8px; }
  .vl { font-family:var(--font-mono); font-size:10.5px; color:var(--muted-foreground); margin-top:1px; }
</style>
</head>
<body>
  <div class="lead"><b>Corner radius</b><span>Base --radius 8px with derived steps; pills use full rounding.</span></div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="nm">sm</div><div class="vl">4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="nm">md</div><div class="vl">6px · controls</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="nm">lg</div><div class="vl">8px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="nm">xl</div><div class="vl">12px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="nm">2xl</div><div class="vl">16px · marketing</div></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div><div class="nm">full</div><div class="vl">pills · dots</div></div>
  </div>
</body>
</html>
