<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 22px; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .lead { display:flex; align-items:baseline; gap:8px; margin-bottom: 20px; }
  .lead b { font-size: 14px; font-weight: 700; }
  .lead span { font-size: 12px; color: var(--muted-foreground); }
  .row { display:flex; align-items:center; gap:34px; }
  .item { text-align:center; }
  .item img { display:block; }
  .cap { font-size:11px; color:var(--muted-foreground); margin-top:10px; }
  .wm { height:48px; }
  .gl { width:72px;height:72px; }
</style>
</head>
<body>
  <div class="lead"><b>App mark</b><span>Wordmark + rounded‑square "D" glyph. PWA brand blue #2563EB.</span></div>
  <div class="row">
    <div class="item"><img class="wm" src="../assets/docturn-wordmark.svg" alt="DocTurn"><div class="cap">Primary wordmark</div></div>
    <div class="item"><img class="gl" src="../assets/docturn-glyph.svg" alt="D glyph"><div class="cap">PWA / maskable icon</div></div>
    <div class="item"><img class="gl" src="../assets/docturn-glyph-sky.svg" alt="D glyph sky"><div class="cap">Landing sky tile</div></div>
    <div class="item"><img class="wm" src="../assets/docturn-wordmark-marketing.svg" alt="DocTurn marketing"><div class="cap">Marketing wordmark</div></div>
  </div>
</body>
</html>
