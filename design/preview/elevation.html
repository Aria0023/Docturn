<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 22px; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .lead { display:flex; align-items:baseline; gap:8px; margin-bottom: 22px; }
  .lead b { font-size: 14px; font-weight: 700; }
  .lead span { font-size: 12px; color: var(--muted-foreground); }
  .row { display:flex; gap:20px; }
  .item { text-align:center; }
  .box { width:96px; height:58px; background:#fff; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--muted-foreground); }
  .nm { font-size:11.5px; font-weight:600; margin-top:12px; }
  .glow { background:var(--sky-gradient); color:#fff; }
</style>
</head>
<body>
  <div class="lead"><b>Elevation</b><span>Soft shadows lift interactive surfaces — they never decorate. Depth rises on hover.</span></div>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)">sm</div><div class="nm">buttons, small cards</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)">md</div><div class="nm">CTAs, raised panels</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)">lg</div><div class="nm">popovers, menus</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)">xl</div><div class="nm">hero cards, modals</div></div>
    <div class="item"><div class="box glow" style="box-shadow:var(--shadow-glow)">glow</div><div class="nm">sky CTA glow</div></div>
  </div>
</body>
</html>
