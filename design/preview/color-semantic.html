<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 52px; }
  .meta { padding: 7px 10px; }
  .name { font-size: 12.5px; font-weight: 600; }
  .hsl { font-size: 10.5px; color: var(--muted-foreground); font-family: var(--font-mono); margin-top: 2px; }
  .lead { display:flex; align-items:baseline; gap:8px; margin-bottom: 14px; }
  .lead b { font-size: 14px; font-weight: 700; }
  .lead span { font-size: 12px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="lead"><b>Semantic UI tokens</b><span>Drive every shadcn/ui component. Reference the token, never the hex.</span></div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:hsl(0 0% 100%); box-shadow: inset 0 0 0 1px var(--border)"></div><div class="meta"><div class="name">background / card</div><div class="hsl">0 0% 100%</div></div></div>
    <div class="sw"><div class="chip" style="background:hsl(222 84% 5%)"></div><div class="meta"><div class="name">foreground</div><div class="hsl">222 84% 5%</div></div></div>
    <div class="sw"><div class="chip" style="background:hsl(210 40% 96%)"></div><div class="meta"><div class="name">secondary / muted</div><div class="hsl">210 40% 96%</div></div></div>
    <div class="sw"><div class="chip" style="background:hsl(215 16% 47%)"></div><div class="meta"><div class="name">muted‑foreground</div><div class="hsl">215 16% 47%</div></div></div>
    <div class="sw"><div class="chip" style="background:hsl(214 32% 91%)"></div><div class="meta"><div class="name">border / input</div><div class="hsl">214 32% 91%</div></div></div>
    <div class="sw"><div class="chip" style="background:hsl(0 84% 60%)"></div><div class="meta"><div class="name">destructive</div><div class="hsl">0 84% 60%</div></div></div>
  </div>
</body>
</html>
