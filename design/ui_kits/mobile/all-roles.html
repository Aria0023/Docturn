<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DocTurn — Mobile App, all roles</title>
<link rel="stylesheet" href="tokens.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-sans); color: var(--foreground); background: #E7ECF3; -webkit-font-smoothing: antialiased; }
  @keyframes dt-pulse { 0% { transform: scale(1); opacity: .55; } 70% { transform: scale(2.4); opacity: 0; } 100% { opacity: 0; } }
  @keyframes dt-spin { to { transform: rotate(360deg); } }
  input { font-family: var(--font-sans); }
  ::-webkit-scrollbar { height: 10px; width: 10px; }
  ::-webkit-scrollbar-thumb { background: #c3cbd6; border-radius: 99px; }
  #scaler { transform: scale(var(--s, 1)); transform-origin: top center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="20" fill="#2563EB"/>
    <text x="50" y="68" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="700" fill="#fff" text-anchor="middle">D</text>
  </svg>
</template>

<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="roles.jsx"></script>

<script type="text/babel" data-presets="react">
const ROLE_ORDER = ["hospitalist", "er_doctor", "er_director", "director", "developer"];

function RolePhone({ role }) {
  const cfg = ROLE_CONFIG[role];
  const [tab, setTab] = React.useState("home");
  React.useEffect(() => { setTab("home"); }, [role]);
  return (
    <IOSDevice>
      <div style={{ minHeight: "100%", display: "flex", flexDirection: "column", background: "#F2F4F8" }}>
        <div style={{ flex: 1 }}>{roleTab(role, tab)}</div>
        <RoleTabBar tabs={cfg.tabs} active={tab} onTab={setTab} badge={2} />
      </div>
    </IOSDevice>
  );
}

function Switcher() {
  const [role, setRole] = React.useState("hospitalist");
  const cfg = ROLE_CONFIG[role];
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", padding: "22px 16px 40px" }}>
      <div style={{ textAlign: "center", marginBottom: 16 }}>
        <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0, letterSpacing: "-.02em" }}>DocTurn Mobile — every role</h1>
        <p style={{ fontSize: 13.5, color: "var(--muted-foreground)", margin: "5px 0 0" }}>Pick a user type to see its app. Each role has its own tabs and workflow.</p>
      </div>
      {/* role switcher */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center", marginBottom: 22, maxWidth: 560 }}>
        {ROLE_ORDER.map((r) => {
          const c = ROLE_CONFIG[r];
          const on = r === role;
          return (
            <button key={r} onClick={() => setRole(r)} style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 15px", borderRadius: 99, cursor: "pointer", fontFamily: "var(--font-sans)", fontSize: 13.5, fontWeight: 600, whiteSpace: "nowrap", transition: "all .15s", border: on ? "1px solid " + c.tint : "1px solid var(--border)", background: on ? c.tint : "#fff", color: on ? "#fff" : "var(--foreground)", boxShadow: on ? "0 4px 12px " + c.tint + "40" : "none" }}>
              <span style={{ width: 9, height: 9, borderRadius: 3, flex: "none", background: on ? "rgba(255,255,255,.9)" : c.tint }} />
              {c.label}
            </button>
          );
        })}
      </div>
      <div id="scaler">
        <RolePhone key={role} role={role} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Switcher />);

function fit() {
  const s = Math.min(1, (window.innerHeight - 230) / 874);
  document.documentElement.style.setProperty("--s", Math.max(0.5, s));
}
window.addEventListener("resize", fit); fit();
setTimeout(fit, 300);
</script>
</body>
</html>
