<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DocTurn — Mobile + Web, side by side</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #E7ECF3;
    color: #0b1220;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    display: flex;
    align-items: flex-start;
    gap: 56px;
    padding: 56px;
    width: max-content;
    min-width: 100%;
  }
  .frame { display: flex; flex-direction: column; gap: 14px; }
  .label { display: flex; align-items: baseline; gap: 12px; padding-left: 4px; }
  .label .name { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .label .meta {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; color: #64748B;
  }
  .card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 1px 2px rgb(0 0 0 / 0.05), 0 24px 48px -16px rgb(15 23 42 / 0.22);
    overflow: hidden;
    border: 1px solid rgb(15 23 42 / 0.06);
  }
  iframe { display: block; border: 0; background: #fff; }
  .mobile-card iframe { width: 600px; height: 900px; }
  .web-card iframe { width: 1320px; height: 900px; }
  .hint {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    background: rgb(11 18 32 / 0.86); color: #fff; backdrop-filter: blur(8px);
    font-size: 12.5px; padding: 8px 16px; border-radius: 99px;
    box-shadow: 0 6px 20px rgb(0 0 0 / 0.25); pointer-events: none;
    font-weight: 500; letter-spacing: 0.01em;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="frame mobile-card">
      <div class="label">
        <span class="name">Mobile app</span>
        <span class="meta">ui_kits/mobile · iOS · every role</span>
      </div>
      <div class="card">
        <iframe src="ui_kits/mobile/all-roles.html" title="DocTurn mobile app — all roles" loading="eager"></iframe>
      </div>
    </div>

    <div class="frame web-card">
      <div class="label">
        <span class="name">Web app</span>
        <span class="meta">ui_kits/web-app · clinical console · log in to pick a role</span>
      </div>
      <div class="card">
        <iframe src="ui_kits/web-app/index.html" title="DocTurn clinical web app" loading="eager"></iframe>
      </div>
    </div>
  </div>

  <div class="hint">Scroll / pinch to pan &amp; zoom · both demos are live and interactive</div>
</body>
</html>
