<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// Catch a render error in any one screen so it shows a recoverable message
// instead of blanking the whole app. (One bad component shouldn't take the
// page down — and a stale saved session shouldn't either.)
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err) { console.error("[DocTurn] screen error:", err); }
  render() {
    if (this.state.err) {
      return (
        <div style={{ padding: 40, maxWidth: 560, margin: "40px auto", fontFamily: "var(--font-sans)" }}>
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>Something went wrong on this screen</div>
          <div style={{ fontSize: 13.5, color: "var(--muted-foreground)", lineHeight: 1.6, marginBottom: 18 }}>
            {String(this.state.err && this.state.err.message || this.state.err)}
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => { this.setState({ err: null }); try { window.DT.actions.setNav("dashboard"); } catch (e) {} }}
              style={{ padding: "9px 16px", borderRadius: 8, border: "none", background: "var(--primary)", color: "#fff", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>Back to dashboard</button>
            <button onClick={() => { try { localStorage.clear(); } catch (e) {} location.reload(); }}
              style={{ padding: "9px 16px", borderRadius: 8, border: "1px solid var(--border)", background: "#fff", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>Reset & sign out</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const ROLE_META = {
  hospitalist: { title: "Census & assignments", subtitle: "Accept incoming hand‑offs and manage your patients" },
  er_doctor:   { title: "Patient intake", subtitle: "Admit a patient and route to a hospitalist" },
  er_director: { title: "ER operations", subtitle: "Intake throughput, ER staffing and routing performance" },
  director:    { title: "Hospital overview", subtitle: "Hospitalist providers, rotation and reassignment" },
  developer:   { title: "Organizations", subtitle: "Cross‑tenant platform administration" },
};

// Per-role navigation. Director & developer unlock the new admin surfaces.
const NAV = {
  hospitalist: [
    { id: "dashboard", label: "Dashboard", icon: "layout-dashboard" },
    { id: "history",   label: "History", icon: "history" },
    { id: "messages",  label: "Messages",  icon: "message-square", badge: 2 },
    { id: "directory", label: "Directory", icon: "contact" },
    { id: "compliance", label: "Compliance", icon: "shield-check" },
  ],
  er_doctor: [
    { id: "dashboard", label: "Dashboard", icon: "layout-dashboard" },
    { id: "messages",  label: "Messages",  icon: "message-square", badge: 2 },
    { id: "directory", label: "Directory", icon: "contact" },
    { id: "compliance", label: "Compliance", icon: "shield-check" },
  ],
  er_director: [
    { id: "dashboard",  label: "ER operations", icon: "ambulance" },
    { id: "board",      label: "Patient board", icon: "layout-list" },
    { id: "broadcasts", label: "Broadcasts", icon: "megaphone" },
    { id: "messages",   label: "Messages",   icon: "message-square", badge: 2 },
    { id: "directory",  label: "Directory",  icon: "contact" },
    { id: "compliance", label: "Compliance", icon: "shield-check" },
    { id: "appearance", label: "Appearance", icon: "palette" },
    { id: "settings",   label: "Settings",   icon: "settings" },
  ],
  director: [
    { id: "dashboard",  label: "Overview",   icon: "layout-dashboard" },
    { id: "board",      label: "Patient board", icon: "layout-list" },
    { id: "admissions", label: "Admissions log", icon: "scroll-text" },
    { id: "broadcasts", label: "Broadcasts", icon: "megaphone" },
    { id: "messages",   label: "Messages",   icon: "message-square", badge: 2 },
    { id: "directory",  label: "Directory",  icon: "contact" },
    { id: "compliance", label: "Compliance", icon: "shield-check" },
    { id: "appearance", label: "Appearance", icon: "palette" },
    { id: "settings",   label: "Settings",   icon: "settings" },
  ],
  developer: [
    { id: "dashboard",  label: "Organizations",   icon: "building-2" },
    { id: "roles",      label: "Role management", icon: "shield-half" },
    { id: "consult",    label: "Consult services", icon: "stethoscope" },
    { id: "compliance", label: "Compliance",      icon: "shield-check" },
    { id: "appearance", label: "Appearance",      icon: "palette" },
    { id: "settings",   label: "Tenant settings", icon: "settings" },
  ],
};

// Topbar title/subtitle for the shared admin screens.
const TOP = {
  board:      ["Patient board", "Who's responsible for every distributed patient"],
  admissions: ["Admissions log", "Every patient routed to a team — full history"],
  history:    ["Assignment history", "Everything you've accepted — rolling 3 days"],
  team:       ["My care team", "Link midlevels and partners into your on-call unit"],
  messages:   ["Secure messaging", "Direct, group and emergency broadcast"],
  directory:  ["Directory", "Providers, on‑call availability and people"],
  broadcasts: ["Emergency broadcasts", "Targeted alerts with acknowledgement tracking"],
  compliance: ["Audit & compliance", "HIPAA audit trail, PHI access and incidents"],
  roles:      ["Role management", "Create and manage user roles, permissions and portal access"],
  consult:    ["Consult services", "Curate consult services and on-call — shared across the app"],
  people:     ["People", "Manage everyone in your organization, grouped by role"],
  access:     ["Access & people", "Manage your organization's people and the roles that govern their access"],
  appearance: ["Appearance & layout", "Customize branding, theme and navigation structure"],
  settings:   ["Organization settings", "Rotation rules, feature flags and integrations"],
};

function Toast({ toast }) {
  if (!toast) return null;
  const tone = toast.tone || "accepted";
  const ic = { accepted: "check-circle-2", sent: "send", rejected: "alert-triangle" }[tone] || "check-circle-2";
  const fg = { accepted: "var(--status-accepted)", sent: "var(--status-active)", rejected: "var(--destructive)" }[tone];
  return (
    <div style={{ position: "fixed", top: 18, right: 18, zIndex: 50, animation: "dt-toast-in .25s ease" }}>
      <div style={{ display: "flex", gap: 11, alignItems: "flex-start", background: "#fff", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-lg)", padding: "12px 16px", maxWidth: 340 }}>
        <Icon name={ic} size={18} color={fg} style={{ marginTop: 1 }} />
        <div>
          <div style={{ fontSize: 13.5, fontWeight: 600 }}>{toast.title}</div>
          {toast.msg && <div style={{ fontSize: 12, color: "var(--muted-foreground)", marginTop: 2 }}>{toast.msg}</div>}
        </div>
      </div>
    </div>
  );
}

function RoleSwitcher({ role, onChange }) {
  const roles = [["hospitalist", "Hospitalist"], ["er_doctor", "ER physician"], ["er_director", "ER director"], ["director", "Hosp. director"], ["developer", "Developer"]];
  return (
    <div style={{ display: "flex", gap: 2, padding: 3, background: "var(--secondary)", borderRadius: "var(--radius-md)" }}>
      {roles.map(([id, label]) => (
        <button key={id} onClick={() => onChange(id)}
          style={{ padding: "6px 11px", borderRadius: 5, border: "none", cursor: "pointer", fontSize: 12.5, fontWeight: 500,
            background: role === id ? "#fff" : "transparent", color: role === id ? "var(--primary)" : "var(--muted-foreground)",
            boxShadow: role === id ? "var(--shadow-sm)" : "none" }}>{label}</button>
      ))}
    </div>
  );
}

function NotificationsPanel({ open, items, onClose }) {
  if (!open) return null;
  return (
    <React.Fragment>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 40 }} />
      <div style={{ position: "fixed", top: 58, right: 18, width: 344, zIndex: 41, background: "#fff", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-xl)", overflow: "hidden" }}>
        <div style={{ padding: "13px 16px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 14, fontWeight: 700 }}>Notifications</span>
          <span style={{ fontSize: 12, color: "var(--muted-foreground)" }}>{items.length} recent</span>
        </div>
        <div style={{ maxHeight: 400, overflowY: "auto" }}>
          {items.length === 0 && <div style={{ padding: 30, textAlign: "center", fontSize: 13, color: "var(--muted-foreground)" }}>You're all caught up.</div>}
          {items.map((n, i) => (
            <div key={n.id} style={{ display: "flex", gap: 11, padding: "12px 16px", borderTop: i ? "1px solid var(--border)" : "none" }}>
              <span style={{ width: 32, height: 32, borderRadius: "var(--radius-md)", background: "var(--secondary)", display: "flex", alignItems: "center", justifyContent: "center", flex: "none" }}><Icon name={n.icon} size={16} color="var(--primary)" /></span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{n.title}</div>
                <div style={{ fontSize: 12, color: "var(--muted-foreground)", marginTop: 1 }}>{n.body}</div>
                <div style={{ fontSize: 11, color: "var(--muted-foreground)", marginTop: 3 }}>{dtFmt.ago(n.at)}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </React.Fragment>
  );
}

function App() {
  const st = useStore();
  const a = useActions();
  const role = st.session && st.session.role;
  const nav = st.ui.nav;
  const [locked, setLocked] = React.useState(false);
  const isMobile = useIsMobile();
  const [drawer, setDrawer] = React.useState(false);
  React.useEffect(() => { setDrawer(false); }, [nav]); // close the mobile menu on navigate

  // Idle auto-lock (HIPAA). Resets on any interaction; locks after 15 min idle.
  React.useEffect(() => {
    if (!role) return;
    let timer;
    const arm = () => { clearTimeout(timer); timer = setTimeout(() => setLocked(true), 15 * 60 * 1000); };
    const evs = ["mousemove", "mousedown", "keydown", "scroll", "touchstart"];
    evs.forEach((e) => window.addEventListener(e, arm));
    arm();
    return () => { clearTimeout(timer); evs.forEach((e) => window.removeEventListener(e, arm)); };
  }, [role]);

  useEffect(() => {
    if (st.__toast) { const id = setTimeout(() => a.clearToast(), 2800); return () => clearTimeout(id); }
  }, [st.__toast]);

  if (!role) return <React.Fragment><ThemeStyle theme={st.theme} /><LoginScreen onLogin={(r, org, user) => a.login(r, org, user)} appName={st.theme.appName} /></React.Fragment>;

  const sortedProviders = DT.sortedProviders();
  // compose nav: master list → apply per-role hidden + custom order, keep dashboard first
  const master = NAV[role];
  const hidden = st.navHidden[role] || [];
  const order = st.navOrder[role];
  let composed = master.filter((it) => it.id === "dashboard" || !hidden.includes(it.id));
  if (order && order.length) {
    composed = composed.slice().sort((x, y) => {
      const ix = order.indexOf(x.id), iy = order.indexOf(y.id);
      return (ix < 0 ? 999 : ix) - (iy < 0 ? 999 : iy);
    });
  }
  const navItems = composed.map((it) => it.id === "messages" ? { ...it, badge: DT.unreadMessages() || undefined } : it);
  const meta = ROLE_META[role];

  const message = (person) => { a.startConversation(person); a.setNav("messages"); };

  const boardEl = <PatientBoard patients={st.board} role={role} providers={st.providers} fhir={st.fhir} modules={DT.boardModules(role)} canCustomize={role === "director" || role === "er_director"} onSetModule={(k, v) => a.setBoardModule(role, k, v)} onReassign={a.reassignBoard} onUpdate={a.updateBoardRow} onAdd={a.addBoardPatient} onRemove={a.removeBoardPatient} onConnectFhir={a.connectFhir} onDisconnectFhir={a.disconnectFhir} onSyncFhir={a.syncFhir} />;

  // Roles that also manage org people/roles — their Directory tab folds in the
  // Access & people surfaces (People + Roles & permissions) as sub-tabs.
  const dirDomain = (role === "er_director")
    ? { roles: ["er_doctor", "er_director", "consultant"], portals: ["er_physician", "er_director"] }
    : { roles: ["hospitalist", "director", "consultant"], portals: ["hospitalist", "hosp_director"] };
  const canManagePeople = role === "director" || role === "er_director";

  // ER Consult services come from the director-curated menu. Each service's
  // on-call = its pinned consultant, else the provider of that specialty whose
  // SHIFT IS ACTIVE NOW (schedule-driven, auto-rotating across day/swing/night)
  // — no fake fallback. Members = the PA/NPs assigned under it.
  const MIDLEVEL_CREDS = { PA: 1, NP: 1, RN: 1 };
  // Schedule-driven on-call by specialty (auto-rotates with the clock).
  const dirRoster = window.onCallRoster ? window.onCallRoster(st.directory) : {};
  const midlevels = (st.directory || []).filter((d) => MIDLEVEL_CREDS[d.credential]).map((d) => ({ id: "ml" + d.id, name: d.name, avatar: d.avatar, role: d.credential }));
  const consultCfg = st.consultServices || [];
  const consultServiceNames = consultCfg.length ? consultCfg.map((s) => s.name) : null;
  const consultConfig = {};
  consultCfg.forEach((s) => {
    consultConfig[s.name] = {
      onCall: (s.onCall && s.onCall.name) ? s.onCall : (dirRoster[s.name] || null),
      members: s.members || [],
    };
  });

  let screen;
  if (nav === "messages") screen = <Messaging />;
  else if (nav === "directory") screen = canManagePeople
    ? <DirectoryHub providers={sortedProviders} onMessage={message} scopeOrg={st.selectedOrg} domainRoles={dirDomain.roles} domainPortals={dirDomain.portals} roles={st.roles} onCreate={a.createRole} onUpdate={a.updateRole} onDelete={a.deleteRole} />
    : <Directory providers={sortedProviders} onMessage={message} />;
  else if (nav === "board") screen = boardEl;
  else if (nav === "admissions") screen = <AdmissionsLog admissions={st.admissions} resetAt={st.admissionsResetAt} />;
  else if (nav === "history") screen = <HospitalistHistory admissions={st.myAdmissions} days={3} />;
  else if (nav === "team") {
    const consultCounts = {};
    (st.board || []).forEach((b) => (b.consultants || []).forEach((c) => { const k = (typeof c === "string") ? c : (c.specialty || c.name); if (k) consultCounts[k] = (consultCounts[k] || 0) + 1; }));
    const consultantsList = Object.keys(consultCounts).map((spec) => ({ spec, count: consultCounts[spec] }));
    screen = <CareTeam me={st.me} team={st.team} candidates={st.candidates} onAdd={a.addMember} onRemove={a.removeMember} onToggleCall={a.toggleMemberCall} providers={st.providers} consultants={consultantsList} onMessage={message} />;
  }
  else if (nav === "broadcasts") screen = <Broadcasts onSend={a.sendBroadcast} broadcasts={st.broadcasts} />;
  else if (nav === "compliance") screen = <Compliance audit={st.audit} phiLog={st.phiLog} incidents={st.incidents} onResolve={a.resolveIncident} />;
  else if (nav === "roles") screen = <RoleManagement roles={st.roles} onCreate={a.createRole} onUpdate={a.updateRole} onDelete={a.deleteRole} />;
  else if (nav === "consult") screen = <ConsultServices />;
  else if (nav === "people") screen = <PeopleManager scopeOrg={st.selectedOrg} />;
  else if (nav === "access") {
    const dom = role === "er_director"
      ? { roles: ["er_doctor", "er_director", "consultant"], portals: ["er_physician", "er_director"] }
      : { roles: ["hospitalist", "director", "consultant"], portals: ["hospitalist", "hosp_director"] };
    screen = <AccessPeople scopeOrg={st.selectedOrg} domainRoles={dom.roles} domainPortals={dom.portals} roles={st.roles} onCreate={a.createRole} onUpdate={a.updateRole} onDelete={a.deleteRole} />;
  }
  else if (nav === "appearance") screen = <Appearance theme={st.theme} role={role} master={NAV[role]} navHidden={st.navHidden[role] || []} navOrder={navItems.map((n) => n.id)} onSetTheme={a.setTheme} onToggleNav={a.toggleNavItem} onMoveNav={a.moveNavItem} onReset={() => a.resetLayout(role)} />;
  else if (nav === "settings") screen = <OrgSettings />;
  else if (role === "hospitalist") screen = <HospitalistDashboard pending={st.pending} myAdmissions={st.myAdmissions} onAccept={a.accept} onDecline={a.decline} onMessage={message} providers={st.providers} meName={st.me && st.me.name} rotationMode={st.settings && st.settings.rotationMode} onOpenHistory={() => a.setNav("history")} />;
  else if (role === "er_doctor") screen = <CustomizableDashboard role="er_doctor" widgets={[
    { id: "mymetrics", label: "My metrics", icon: "activity", node: <ErMyMetricsPanel sent={st.sent} meName={st.me && st.me.name} avgAcceptSec={st.avgAcceptSec} /> },
    { id: "intake", label: "Patient intake & routing", icon: "clipboard-plus", node: <IntakeRoutingPanel providers={sortedProviders} onSend={a.sendAssignment} consultConfig={consultConfig} midlevels={midlevels} services={consultServiceNames} /> },
    { id: "board", label: "Patient board", icon: "layout-list", node: <RoutedBoardPanel sent={st.sent} providers={sortedProviders} onReassign={a.reassignSent} /> },
  ]} />;
  else if (role === "er_director") screen = <CustomizableDashboard role="er_director" widgets={[
    { id: "diversion", label: "Diversion status", icon: "octagon-alert", node: <ErDiversionPanel diversion={st.diversion} onToggleDiversion={a.toggleDiversion} /> },
    { id: "stats", label: "Throughput stats", icon: "activity", node: <ErStatsPanel erPhysicians={st.erPhysicians} sent={st.sent} board={st.board} avgAcceptSec={st.avgAcceptSec} /> },
    { id: "roster", label: "ER physicians roster", icon: "ambulance", node: <ErRosterPanel erPhysicians={st.erPhysicians} shifts={st.shifts} onToggle={a.toggleErPhysician} onUpdate={a.updateErPhysician} onSetShift={a.setErShift} onAdd={a.addErPhysician} onRemove={a.removeErPhysician} /> },
    { id: "recent", label: "Recent intakes", icon: "history", node: <ErRecentIntakesPanel sent={st.sent} /> },
    { id: "ops", label: "ER operations", icon: "megaphone", node: <ErOpsPanel onBroadcasts={() => a.setNav("broadcasts")} /> },
    { id: "intake", label: "Patient intake & routing", icon: "clipboard-plus", node: <IntakeRoutingPanel providers={sortedProviders} onSend={a.sendAssignment} consultConfig={consultConfig} midlevels={midlevels} services={consultServiceNames} /> },
    { id: "board", label: "Patient board", icon: "layout-list", node: <RoutedBoardPanel sent={st.sent} providers={sortedProviders} onReassign={a.reassignSent} /> },
  ]} />;
  else if (role === "developer") screen = <DeveloperDashboard organizations={st.orgs} devUsers={st.devUsers} roleColors={st.roleColors} diagnostics={st.diagnostics} audit={st.audit} onSelectOrg={(o) => { a.selectOrg(o.code); a.setNav("settings"); }} onAddUser={a.addUser} onRemoveUser={a.removeUser} onSetRoleColor={a.setRoleColor} onAddTenant={a.addTenant} onToggleTenant={a.toggleTenant} onDeleteTenant={a.deleteTenant} onDiagnostics={a.runDiagnostics} onImpersonate={a.impersonate} />;
  else screen = <CustomizableDashboard role="director" widgets={[
    { id: "rotation", label: "Rotation & roster", icon: "users-round", node: <DirectorDashboard bare providers={st.providers} shifts={st.shifts} settings={st.settings} onToggleWorking={a.toggleWorking} onAdjustCensus={a.adjustCensus} onAdjustCap={a.adjustCap} onBulkWorking={a.bulkWorking} onReorder={a.reorderProviders} onToggleRotation={a.toggleRotation} onSetAllCap={a.setAllCap} onUpdateShift={a.updateShift} onSetShift={a.setShiftFor} onAddProvider={a.addProvider} onResetRotation={a.resetRotation} onSetTimeout={(v) => a.setSetting("timeout", v)} onToggleAutoReassign={() => a.setSetting("autoReassign", !st.settings.autoReassign)} onUpdateProvider={a.updateProvider} onRemoveProvider={a.removeProvider} onRenameShift={a.renameShift} onOpenSchedule={() => a.setNav("settings")} admissions={st.admissions} admissionsResetAt={st.admissionsResetAt} onResetAdmissions={a.resetAdmissions24h} onOpenAdmissions={() => a.setNav("admissions")} /> },
    { id: "board", label: "Patient board (declines & reassign)", icon: "layout-list", node: boardEl },
    { id: "admissions", label: "Admissions log", icon: "scroll-text", node: <AdmissionsLog bare admissions={st.admissions} resetAt={st.admissionsResetAt} /> },
  ]} />;

  const topTitle = TOP[nav] ? TOP[nav][0] : meta.title;
  const topSub   = TOP[nav] ? TOP[nav][1] : meta.subtitle;

  const impersonationBanner = st.impersonating && (
    <div style={{ display: "flex", alignItems: "center", gap: 11, padding: "9px 18px", background: "#7C2D12", color: "#fff", flexWrap: "wrap" }}>
      <Icon name="eye" size={16} color="#FDBA74" />
      <span style={{ fontSize: 13, fontWeight: 600 }}>Root access — viewing {st.impersonating.name}'s portal ({st.impersonating.role.replace(/_/g, " ")} · {st.impersonating.org})</span>
      <span style={{ fontSize: 12, color: "#FED7AA" }}>You're seeing exactly what this user sees. Actions are audited.</span>
      <button onClick={() => a.stopImpersonating()} style={{ marginLeft: "auto", display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 12px", borderRadius: "var(--radius-md)", border: "1px solid rgba(255,255,255,.4)", background: "transparent", color: "#fff", fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: "var(--font-sans)" }}><Icon name="arrow-left" size={13} />Return to developer</button>
    </div>
  );

  if (isMobile) {
    return (
      <div style={{ minHeight: "100vh", background: "var(--secondary)", display: "flex", flexDirection: "column" }}>
        <ThemeStyle theme={st.theme} />
        {/* mobile top bar */}
        <header style={{ height: 56, flex: "none", position: "sticky", top: 0, zIndex: 20, background: "rgba(255,255,255,.95)", backdropFilter: "blur(6px)", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10, padding: "0 12px" }}>
          <button onClick={() => setDrawer(true)} title="Menu" style={{ width: 38, height: 38, borderRadius: "var(--radius-md)", border: "1px solid var(--border)", background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flex: "none" }}><Icon name="menu" size={20} /></button>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 700, lineHeight: 1.15, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{topTitle}</div>
          </div>
          <button onClick={() => a.toggleNotif()} title="Notifications" style={{ position: "relative", width: 38, height: 38, borderRadius: "var(--radius-md)", border: "1px solid var(--border)", background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flex: "none" }}>
            <Icon name="bell" size={18} />
            {DT.unreadNotifs() > 0 && <span style={{ position: "absolute", top: -5, right: -5, minWidth: 17, height: 17, padding: "0 4px", borderRadius: 99, background: "var(--destructive)", color: "#fff", fontSize: 10.5, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", border: "2px solid #fff" }}>{DT.unreadNotifs()}</span>}
          </button>
          <button onClick={() => setLocked(true)} title="Lock" style={{ width: 38, height: 38, borderRadius: "var(--radius-md)", border: "1px solid var(--border)", background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flex: "none" }}><Icon name="lock" size={17} /></button>
        </header>
        {impersonationBanner}
        <main style={{ flex: 1, minWidth: 0, background: nav === "messages" ? "#fff" : "var(--secondary)" }}><ErrorBoundary key={nav}>{screen}</ErrorBoundary></main>

        {/* slide-out nav drawer */}
        {drawer && (
          <React.Fragment>
            <div onClick={() => setDrawer(false)} style={{ position: "fixed", inset: 0, zIndex: 40, background: "rgba(15,23,42,.45)" }} />
            <div style={{ position: "fixed", top: 0, left: 0, bottom: 0, width: 264, maxWidth: "82vw", zIndex: 41, background: "#fff", boxShadow: "var(--shadow-xl)", display: "flex", flexDirection: "column" }}>
              <div style={{ flex: 1, minHeight: 0, overflowY: "auto" }}>
                <Sidebar role={role} nav={navItems} active={nav} onNav={(id) => { a.setNav(id); setDrawer(false); }} me={st.me} onLogout={a.logout} onRenameMe={a.renameMe} compact={false} appName={st.theme.appName} />
              </div>
              <div style={{ flex: "none", borderTop: "1px solid var(--border)", padding: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".04em", color: "var(--muted-foreground)", marginBottom: 8 }}>Demo as role</div>
                <div style={{ overflowX: "auto" }}><RoleSwitcher role={role} onChange={(r) => { a.setRole(r); setDrawer(false); }} /></div>
              </div>
            </div>
          </React.Fragment>
        )}
        <NotificationsPanel open={st.ui.notifOpen} items={st.notifications} onClose={() => a.toggleNotif(false)} />
        <Toast toast={st.__toast} />
        {locked && <LockScreen me={st.me} appName={st.theme.appName} onUnlock={() => setLocked(false)} />}
      </div>
    );
  }

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "var(--secondary)" }}>
      <ThemeStyle theme={st.theme} />
      <Sidebar role={role} nav={navItems} active={nav} onNav={a.setNav} me={st.me} onLogout={a.logout} onRenameMe={a.renameMe} compact={st.theme.sidebar === "compact"} appName={st.theme.appName} />
      <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
        <Topbar title={topTitle} subtitle={topSub}
          working={role === "hospitalist" ? st.ui.onShift : undefined}
          onToggleWorking={role === "hospitalist" && nav === "dashboard" ? a.toggleOnShift : undefined}
          notifCount={DT.unreadNotifs()}
          onBell={() => a.toggleNotif()}
          onLock={() => setLocked(true)}
          right={<RoleSwitcher role={role} onChange={a.setRole} />} />
        {impersonationBanner}
        <main style={{ flex: 1, background: nav === "messages" ? "#fff" : "var(--secondary)" }}><ErrorBoundary key={nav}>{screen}</ErrorBoundary></main>
      </div>
      <NotificationsPanel open={st.ui.notifOpen} items={st.notifications} onClose={() => a.toggleNotif(false)} />
      <Toast toast={st.__toast} />
      {locked && <LockScreen me={st.me} appName={st.theme.appName} onUnlock={() => setLocked(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
